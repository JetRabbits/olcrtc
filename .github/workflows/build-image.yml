name: build-galactic-olcrtc-image

on:
  push:
    branches: [main, master]
    paths:
      - "Dockerfile"
      - ".github/workflows/build-image.yml"
      - "cmd/**"
      - "internal/**"
      - "pkg/**"
      - "go.mod"
      - "go.sum"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          buildkitd-config-inline: |
            [registry.docker.io]
              mirrors = ["mirror.gcr.io"]

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push galactic-olcrtc
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') }}
          platforms: linux/amd64
          tags: |
            ghcr.io/jetrabbits/galactic_vpn/galactic-olcrtc:latest
            ghcr.io/jetrabbits/galactic_vpn/galactic-olcrtc:sha-${{ github.sha }}
